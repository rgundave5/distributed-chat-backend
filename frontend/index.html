<!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
     <title>Messages</title>
     <link rel="stylesheet" href="style.css" />
 </head>
 <body>
    <!-- ========================================
         PAGE 1: AUTH SCREEN
         (Hidden after login/signup)
    ============================================= -->
    <div id="auth-screen">
        <input type="email"    id="auth-email"    placeholder="Email" />
        <input type="password" id="auth-password" placeholder="Password" />

        <button id="auth-login-btn">Log In</button>
        <button id="auth-signup-btn">Sign Up</button>
        <!-- clicking this toggles btwn Login and Signup mode -->
        
        <!-- added! 
         empty paragraph, starts blank, JS puts error messages into it
        -->
        <p id="auth-error"></p>
        

        <!-- fix! -->
        <p>Don't have an account? <span id="auth-toggle-btn">Sign up</span></p>

    </div>
    <script src="index.js"></script>
</body>
